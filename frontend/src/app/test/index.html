<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나에게 맞는 바이브코딩 도구 찾기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow"></div>

  <!-- Intro Screen -->
  <div id="intro" class="screen active">
    <div class="intro-card">
      <div class="intro-emoji">🎵</div>
      <h1>나에게 맞는<br /><span class="gradient-text">바이브코딩 도구</span><br />찾기</h1>
      <p class="intro-desc">6개의 간단한 질문에 답하고<br />나에게 딱 맞는 AI 코딩 도구를 찾아보세요!</p>
      <button class="btn-start" onclick="startQuiz()">
        시작하기
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
      <p class="intro-time">⏱ 약 1분 소요</p>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz" class="screen">
    <div class="quiz-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
        <span class="progress-text" id="progressText">1 / 6</span>
      </div>
      <div class="question-area" id="questionArea">
        <!-- Dynamically filled -->
      </div>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result" class="screen">
    <div class="result-container" id="resultContainer">
      <!-- Dynamically filled -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
